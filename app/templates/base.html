<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 前線觀測站 — 後台</title>
  <style>
    :root { --accent:#2563eb; --bg:#f8fafc; --line:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,"PingFang TC","Noto Sans TC",sans-serif; background:var(--bg); color:#0f172a; }
    header { background:#0f172a; color:#fff; padding:.8rem 1.5rem; display:flex; gap:1.5rem; align-items:center; }
    header h1 { font-size:1.1rem; margin:0 1rem 0 0; }
    header a { color:#cbd5e1; text-decoration:none; }
    header a:hover { color:#fff; }
    main { max-width:1100px; margin:1.5rem auto; padding:0 1rem; }
    .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:1.2rem; margin-bottom:1.2rem; }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; padding:.55rem .6rem; border-bottom:1px solid var(--line); vertical-align:top; font-size:.92rem; }
    th { color:#475569; font-weight:600; }
    a.title-link { color:var(--accent); text-decoration:none; }
    .badge { display:inline-block; padding:.1rem .55rem; border-radius:999px; font-size:.78rem; background:#e2e8f0; }
    .badge.online { background:#dcfce7; color:#166534; }
    .badge.offline { background:#fee2e2; color:#991b1b; }
    .badge.translated { background:#dbeafe; color:#1e40af; }
    .badge.done { background:#dcfce7; color:#166534; }
    .badge.failed { background:#fee2e2; color:#991b1b; }
    .badge.pending { background:#fef9c3; color:#854d0e; }
    button, .btn { background:var(--accent); color:#fff; border:none; border-radius:6px; padding:.45rem .9rem; cursor:pointer; font-size:.9rem; text-decoration:none; display:inline-block; }
    button.ghost { background:#fff; color:#334155; border:1px solid var(--line); }
    button.danger { background:#dc2626; }
    button.icon-btn { background:none; border:none; padding:.25rem .35rem; border-radius:5px; cursor:pointer; line-height:1; color:#64748b; font-size:1rem; transition:background .15s,color .15s; }
    button.icon-btn:hover { background:#f1f5f9; color:#0f172a; }
    button.icon-btn.danger { background:none; color:#94a3b8; }
    button.icon-btn.danger:hover { background:#fee2e2; color:#dc2626; }
    .icon-cell { text-align:center; white-space:nowrap; }
    .fulltext-icon { font-size:.9rem; }
    input[type=text], input[type=url], input[type=datetime-local], input[type=search], select, textarea {
      width:100%; padding:.5rem .6rem; border:1px solid var(--line); border-radius:6px; font:inherit; }
    textarea { min-height:320px; font-family:ui-monospace,Menlo,monospace; font-size:.88rem; }
    form.inline { display:inline; }
    .flash { background:#dbeafe; border:1px solid #93c5fd; padding:.6rem 1rem; border-radius:8px; margin-bottom:1rem; }
    .toolbar { display:flex; gap:.6rem; flex-wrap:wrap; align-items:center; margin-bottom:1rem; }
    .toolbar form { display:flex; gap:.6rem; flex:1; }
    .pager { display:flex; gap:.4rem; margin-top:1rem; }
    .pager a, .pager span { padding:.3rem .7rem; border:1px solid var(--line); border-radius:6px; text-decoration:none; color:#334155; background:#fff; }
    .pager .cur { background:var(--accent); color:#fff; border-color:var(--accent); }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; }
    @media (max-width:900px){ .grid2{grid-template-columns:1fr;} }
    .preview { border:1px dashed var(--line); border-radius:8px; padding:1rem; background:#fcfcfd; overflow-wrap:anywhere; }
    label { font-size:.85rem; color:#475569; display:block; margin:.6rem 0 .25rem; }
    .muted { color:#64748b; font-size:.85rem; }
  </style>
</head>
<body>
<header>
  <h1>🛰️ AI 前線觀測站</h1>
  <a href="{{ url_for('index') }}">文章</a>
  <a href="{{ url_for('sources') }}">蒐集來源</a>
  <a href="{{ url_for('platforms') }}">發布平台</a>
  <form class="inline" method="post" action="{{ url_for('collect_now') }}" style="margin-left:auto">
    <button type="submit">立即蒐集＋翻譯</button>
  </form>
</header>
<main>
  {% with messages = get_flashed_messages() %}
    {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
